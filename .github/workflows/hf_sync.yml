# Deploy ai-server/ to Hugging Face Docker Space (clean copy + fresh git history).
# Repository secret required: HF_TOKEN (Hugging Face token with Write access).

name: Sync ai-server to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build clean deployment tree and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: https://huggingface.co/spaces/babarali356789/hawalay-ai-backend
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          DEPLOY_DIR=$(mktemp -d)
          echo "Deploy directory: ${DEPLOY_DIR}"

          cp -a ai-server/. "${DEPLOY_DIR}/"
          cd "${DEPLOY_DIR}"

          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ai-server from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"

          git remote add origin "https://babarali356789:${HF_TOKEN}@huggingface.co/spaces/babarali356789/hawalay-ai-backend"
          git push --force origin main
