# Deploy ai-server/ to Hugging Face Docker Space via huggingface_hub (no git subtree).
# GitHub repository secrets (Settings → Secrets → Actions):
#   HF_TOKEN, GEMINI_API_KEY, MONGO_URI, INTERNAL_SECRET, NODE_SERVER_URL

name: Sync ai-server to Hugging Face

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Write .env for Hugging Face (from GitHub Secrets, not committed to GitHub)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          NODE_SERVER_URL: ${{ secrets.NODE_SERVER_URL }}
        run: |
          set -euo pipefail
          missing=0
          for key in GEMINI_API_KEY MONGO_URI INTERNAL_SECRET NODE_SERVER_URL; do
            if [ -z "${!key:-}" ]; then
              echo "::warning::GitHub secret ${key} is not set — add it under Settings → Secrets → Actions"
              missing=1
            fi
          done
          if [ "${missing}" -eq 1 ]; then
            echo "::error::One or more deploy secrets are missing. The Space .env will be incomplete."
            exit 1
          fi
          cat > ai-server/.env <<EOF
          HOST=0.0.0.0
          PORT=7860
          ENVIRONMENT=production
          NODE_SERVER_URL=${NODE_SERVER_URL}
          MONGO_URI=${MONGO_URI}
          MONGO_DB_NAME=fyp-hawalay
          INTERNAL_SECRET=${INTERNAL_SECRET}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GEMINI_CAPTION_MODEL=gemini-2.0-flash
          GEMINI_EMBEDDING_MODEL=gemini-embedding-2
          YOLO_WEIGHTS_PATH=/app/artifacts/ocr/weights/best.pt
          YOLO_CONFIDENCE_THRESHOLD=0.5
          YOLO_USE_GPU=false
          EASYOCR_LANGS=en
          EASYOCR_USE_GPU=false
          EOF
          echo "Wrote ai-server/.env for Hugging Face deploy (not pushed to GitHub)."

      - name: Upload ai-server to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          pip install --quiet "huggingface_hub>=0.26.0"

          python <<'PY'
          import os
          from pathlib import Path

          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"].strip()
          repo_id = "babarali356789/hawalay-ai-backend"
          folder = Path("ai-server")

          if not folder.is_dir():
              raise SystemExit("ai-server directory not found in checkout")

          env_file = folder / ".env"
          if not env_file.is_file():
              raise SystemExit("ai-server/.env missing — deploy secrets step failed")

          api = HfApi(token=token)

          try:
              who = api.whoami()
              print(f"Authenticated as: {who.get('name', who)}")
          except Exception as exc:
              raise SystemExit(f"HF_TOKEN auth failed: {exc}") from exc

          sha = os.environ.get("GITHUB_SHA", "")[:7]
          message = f"Deploy ai-server from GitHub Actions {sha}"

          api.upload_folder(
              folder_path=str(folder),
              repo_id=repo_id,
              repo_type="space",
              path_in_repo=".",
              commit_message=message,
              delete_patterns="*",
          )

          print(f"Uploaded {folder} → https://huggingface.co/spaces/{repo_id}")
          PY
